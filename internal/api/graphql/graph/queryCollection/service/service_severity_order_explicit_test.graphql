query ServiceSeverityOrderExplicitTest($filter: ServiceFilter, $first: Int, $after: String, $orderBy: [ServiceOrderBy!]) {
  Services(filter: $filter, first: $first, after: $after, orderBy: $orderBy) {
    totalCount
    edges {
      node {
        id
        ccrn
        # Requesting the issue counts to verify the ordering logic
        issueCounts {
          critical
          high
          medium
          low
          none
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      nextPageAfter
    }
  }
}
