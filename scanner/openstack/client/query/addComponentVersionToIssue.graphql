mutation AddComponentVersionToIssue($issueId: ID!, $componentVersionId: ID!) {
    addComponentVersionToIssue (
        issueId: $issueId,
        componentVersionId: $componentVersionId
    ) {
        id
        componentVersions {
            edges {
                node {
                    id
                }
            }
        }
    }
}